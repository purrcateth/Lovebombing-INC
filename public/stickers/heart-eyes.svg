<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <radialGradient id="heartEyesGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FFEB3B"/>
      <stop offset="100%" stop-color="#FFC107"/>
    </radialGradient>
    <filter id="heartEyesShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#FFA000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Circle face -->
  <circle cx="100" cy="100" r="80" fill="url(#heartEyesGrad)" filter="url(#heartEyesShadow)"/>
  <!-- Heart eyes -->
  <g fill="#E53E3E">
    <path d="M70 85 C62 75, 50 75, 50 85 C50 95, 70 108, 70 108 C70 108, 90 95, 90 85 C90 75, 78 75, 70 85Z"/>
    <path d="M130 85 C122 75, 110 75, 110 85 C110 95, 130 108, 130 108 C130 108, 150 95, 150 85 C150 75, 138 75, 130 85Z"/>
  </g>
  <!-- Smile -->
  <path d="M60 120 Q100 160, 140 120" fill="none" stroke="#5D4037" stroke-width="4" stroke-linecap="round"/>
  <!-- Tongue -->
  <ellipse cx="100" cy="135" rx="12" ry="10" fill="#E57373"/>
  <!-- Cheek blush -->
  <circle cx="45" cy="115" r="12" fill="#FF8A80" opacity="0.4"/>
  <circle cx="155" cy="115" r="12" fill="#FF8A80" opacity="0.4"/>
</svg>
