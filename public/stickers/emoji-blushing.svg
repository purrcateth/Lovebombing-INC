<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <radialGradient id="blushGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FFEE58"/>
      <stop offset="100%" stop-color="#FDD835"/>
    </radialGradient>
    <filter id="blushShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#F9A825" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Face -->
  <circle cx="100" cy="100" r="80" fill="url(#blushGrad)" filter="url(#blushShadow)"/>
  <!-- Eyes - wide cute -->
  <circle cx="72" cy="88" r="10" fill="#5D4037"/>
  <circle cx="128" cy="88" r="10" fill="#5D4037"/>
  <!-- Eye shine (bigger for cute look) -->
  <circle cx="76" cy="84" r="4" fill="white"/>
  <circle cx="132" cy="84" r="4" fill="white"/>
  <circle cx="68" cy="90" r="2" fill="white"/>
  <circle cx="124" cy="90" r="2" fill="white"/>
  <!-- Shy smile -->
  <path d="M80 125 Q100 140, 120 125" fill="none" stroke="#5D4037" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Big prominent blush circles -->
  <circle cx="48" cy="112" r="18" fill="#FF8A80" opacity="0.5"/>
  <circle cx="152" cy="112" r="18" fill="#FF8A80" opacity="0.5"/>
  <!-- Eyebrows (slight worry = shy) -->
  <path d="M58 72 Q68 66, 82 70" fill="none" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M142 72 Q132 66, 118 70" fill="none" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
</svg>
