<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <radialGradient id="winkGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FFEE58"/>
      <stop offset="100%" stop-color="#FDD835"/>
    </radialGradient>
    <filter id="winkShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#F9A825" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Face -->
  <circle cx="100" cy="100" r="80" fill="url(#winkGrad)" filter="url(#winkShadow)"/>
  <!-- Open eye (left) -->
  <circle cx="72" cy="88" r="9" fill="#5D4037"/>
  <circle cx="75" cy="85" r="3.5" fill="white"/>
  <!-- Winking eye (right) - closed -->
  <path d="M115 88 Q128 78, 142 88" fill="none" stroke="#5D4037" stroke-width="4" stroke-linecap="round"/>
  <!-- Smile -->
  <path d="M60 118 Q100 150, 140 118" fill="none" stroke="#5D4037" stroke-width="4" stroke-linecap="round"/>
  <!-- Tongue out -->
  <ellipse cx="120" cy="132" rx="10" ry="8" fill="#EF5350"/>
  <!-- Cheeks -->
  <circle cx="48" cy="110" r="14" fill="#FFAB91" opacity="0.4"/>
  <circle cx="152" cy="110" r="14" fill="#FFAB91" opacity="0.4"/>
  <!-- Sparkle near wink -->
  <path d="M155 70 L157 77 L164 79 L157 81 L155 88 L153 81 L146 79 L153 77Z" fill="#FFD54F" opacity="0.7"/>
</svg>
