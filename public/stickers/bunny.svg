<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <radialGradient id="bunnyGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5F5F5"/>
    </radialGradient>
    <filter id="bunnyShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#9E9E9E" flood-opacity="0.2"/>
    </filter>
  </defs>
  <!-- Ears -->
  <ellipse cx="72" cy="42" rx="18" ry="45" fill="white" filter="url(#bunnyShadow)"/>
  <ellipse cx="128" cy="42" rx="18" ry="45" fill="white"/>
  <!-- Inner ears -->
  <ellipse cx="72" cy="42" rx="10" ry="35" fill="#FFB3C1"/>
  <ellipse cx="128" cy="42" rx="10" ry="35" fill="#FFB3C1"/>
  <!-- Head -->
  <ellipse cx="100" cy="120" rx="58" ry="55" fill="url(#bunnyGrad)" filter="url(#bunnyShadow)"/>
  <!-- Eyes -->
  <circle cx="78" cy="110" r="8" fill="#3E2723"/>
  <circle cx="122" cy="110" r="8" fill="#3E2723"/>
  <!-- Eye shine -->
  <circle cx="82" cy="107" r="3" fill="white"/>
  <circle cx="126" cy="107" r="3" fill="white"/>
  <!-- Nose -->
  <ellipse cx="100" cy="125" rx="5" ry="4" fill="#FF8A80"/>
  <!-- Mouth -->
  <path d="M100 129 Q94 137, 90 133" fill="none" stroke="#8D6E63" stroke-width="2" stroke-linecap="round"/>
  <path d="M100 129 Q106 137, 110 133" fill="none" stroke="#8D6E63" stroke-width="2" stroke-linecap="round"/>
  <!-- Whisker dots -->
  <circle cx="88" cy="126" r="1.5" fill="#BDBDBD"/>
  <circle cx="82" cy="123" r="1.5" fill="#BDBDBD"/>
  <circle cx="84" cy="129" r="1.5" fill="#BDBDBD"/>
  <circle cx="112" cy="126" r="1.5" fill="#BDBDBD"/>
  <circle cx="118" cy="123" r="1.5" fill="#BDBDBD"/>
  <circle cx="116" cy="129" r="1.5" fill="#BDBDBD"/>
  <!-- Cheeks -->
  <circle cx="65" cy="125" r="10" fill="#FFB3C1" opacity="0.4"/>
  <circle cx="135" cy="125" r="10" fill="#FFB3C1" opacity="0.4"/>
  <!-- Teeth -->
  <rect x="95" y="133" width="4" height="6" rx="1" fill="white" stroke="#E0E0E0" stroke-width="0.5"/>
  <rect x="101" y="133" width="4" height="6" rx="1" fill="white" stroke="#E0E0E0" stroke-width="0.5"/>
</svg>
