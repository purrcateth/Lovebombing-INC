<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <radialGradient id="catGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FFE0B2"/>
      <stop offset="100%" stop-color="#FFCC80"/>
    </radialGradient>
    <filter id="catShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#E65100" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Ears -->
  <path d="M45 55 L60 15 L85 55Z" fill="#FFCC80" filter="url(#catShadow)"/>
  <path d="M155 55 L140 15 L115 55Z" fill="#FFCC80"/>
  <!-- Inner ears -->
  <path d="M55 52 L65 25 L78 52Z" fill="#FF8A80"/>
  <path d="M145 52 L135 25 L122 52Z" fill="#FF8A80"/>
  <!-- Face -->
  <ellipse cx="100" cy="110" rx="65" ry="60" fill="url(#catGrad)" filter="url(#catShadow)"/>
  <!-- Eyes -->
  <ellipse cx="75" cy="100" rx="10" ry="12" fill="#5D4037"/>
  <ellipse cx="125" cy="100" rx="10" ry="12" fill="#5D4037"/>
  <!-- Eye shine -->
  <circle cx="79" cy="96" r="4" fill="white"/>
  <circle cx="129" cy="96" r="4" fill="white"/>
  <!-- Nose -->
  <path d="M96 115 L100 120 L104 115Z" fill="#FF8A80"/>
  <!-- Mouth -->
  <path d="M100 120 Q92 130, 85 125" fill="none" stroke="#5D4037" stroke-width="2" stroke-linecap="round"/>
  <path d="M100 120 Q108 130, 115 125" fill="none" stroke="#5D4037" stroke-width="2" stroke-linecap="round"/>
  <!-- Whiskers -->
  <line x1="25" y1="108" x2="60" y2="115" stroke="#8D6E63" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="25" y1="120" x2="60" y2="120" stroke="#8D6E63" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="25" y1="132" x2="60" y2="125" stroke="#8D6E63" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="175" y1="108" x2="140" y2="115" stroke="#8D6E63" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="175" y1="120" x2="140" y2="120" stroke="#8D6E63" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="175" y1="132" x2="140" y2="125" stroke="#8D6E63" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Cheeks -->
  <circle cx="60" cy="120" r="10" fill="#FFAB91" opacity="0.4"/>
  <circle cx="140" cy="120" r="10" fill="#FFAB91" opacity="0.4"/>
</svg>
