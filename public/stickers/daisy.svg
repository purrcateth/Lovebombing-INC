<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <filter id="daisyShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#F57F17" flood-opacity="0.2"/>
    </filter>
  </defs>
  <!-- Stem -->
  <path d="M100 140 Q95 160, 100 185" stroke="#66BB6A" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Leaf -->
  <path d="M100 165 Q120 155, 130 160 Q120 170, 100 170" fill="#81C784"/>
  <path d="M100 155 Q80 145, 70 150 Q80 160, 100 158" fill="#81C784"/>
  <!-- Petals -->
  <g filter="url(#daisyShadow)">
    <ellipse cx="100" cy="60" rx="16" ry="32" fill="white" transform="rotate(0 100 95)"/>
    <ellipse cx="100" cy="60" rx="16" ry="32" fill="white" transform="rotate(45 100 95)"/>
    <ellipse cx="100" cy="60" rx="16" ry="32" fill="white" transform="rotate(90 100 95)"/>
    <ellipse cx="100" cy="60" rx="16" ry="32" fill="white" transform="rotate(135 100 95)"/>
    <ellipse cx="100" cy="60" rx="16" ry="32" fill="white" transform="rotate(180 100 95)"/>
    <ellipse cx="100" cy="60" rx="16" ry="32" fill="white" transform="rotate(225 100 95)"/>
    <ellipse cx="100" cy="60" rx="16" ry="32" fill="white" transform="rotate(270 100 95)"/>
    <ellipse cx="100" cy="60" rx="16" ry="32" fill="white" transform="rotate(315 100 95)"/>
  </g>
  <!-- Center -->
  <circle cx="100" cy="95" r="20" fill="#FFD54F"/>
  <circle cx="100" cy="95" r="14" fill="#FFCA28"/>
  <!-- Cute face -->
  <circle cx="93" cy="92" r="2.5" fill="#5D4037"/>
  <circle cx="107" cy="92" r="2.5" fill="#5D4037"/>
  <path d="M94 100 Q100 107, 106 100" fill="none" stroke="#5D4037" stroke-width="2" stroke-linecap="round"/>
  <circle cx="85" cy="98" r="5" fill="#FFAB91" opacity="0.4"/>
  <circle cx="115" cy="98" r="5" fill="#FFAB91" opacity="0.4"/>
</svg>
