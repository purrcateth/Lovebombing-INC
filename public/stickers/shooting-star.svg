<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="shootingStarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE082"/>
      <stop offset="100%" stop-color="#FFB300"/>
    </linearGradient>
    <linearGradient id="trailGrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD54F" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FFD54F" stop-opacity="0"/>
    </linearGradient>
    <filter id="shootingShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#FF8F00" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Trail -->
  <path d="M20 160 Q60 120, 100 90 Q120 75, 130 65" stroke="url(#trailGrad)" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M35 170 Q70 135, 105 100" stroke="#FFCC80" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M15 145 Q50 115, 90 85" stroke="#FFE0B2" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.3"/>
  <!-- Star -->
  <polygon points="145,30 153,55 178,58 159,74 164,100 145,85 126,100 131,74 112,58 137,55" fill="url(#shootingStarGrad)" filter="url(#shootingShadow)"/>
  <!-- Sparkle dots along trail -->
  <circle cx="50" cy="145" r="3" fill="#FFD54F" opacity="0.6"/>
  <circle cx="70" cy="128" r="2" fill="#FFD54F" opacity="0.5"/>
  <circle cx="90" cy="110" r="2.5" fill="#FFD54F" opacity="0.7"/>
  <circle cx="30" cy="155" r="2" fill="#FFE082" opacity="0.4"/>
</svg>
