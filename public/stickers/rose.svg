<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <radialGradient id="roseGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF8A80"/>
      <stop offset="50%" stop-color="#FF5252"/>
      <stop offset="100%" stop-color="#D32F2F"/>
    </radialGradient>
    <filter id="roseShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#C62828" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Stem -->
  <path d="M100 140 Q95 160, 105 185" stroke="#388E3C" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Leaves -->
  <path d="M100 160 Q125 148, 135 158 Q125 168, 100 165" fill="#4CAF50"/>
  <path d="M102 152 Q75 140, 68 148 Q78 160, 100 155" fill="#4CAF50"/>
  <!-- Outer petals -->
  <g filter="url(#roseShadow)">
    <path d="M60 90 Q55 60, 80 50 Q75 80, 60 90Z" fill="#EF5350"/>
    <path d="M140 90 Q145 60, 120 50 Q125 80, 140 90Z" fill="#EF5350"/>
    <path d="M55 100 Q40 80, 60 65 Q60 90, 55 100Z" fill="#E53935"/>
    <path d="M145 100 Q160 80, 140 65 Q140 90, 145 100Z" fill="#E53935"/>
    <path d="M65 120 Q45 110, 50 85 Q60 105, 65 120Z" fill="#C62828"/>
    <path d="M135 120 Q155 110, 150 85 Q140 105, 135 120Z" fill="#C62828"/>
  </g>
  <!-- Inner rose spiral -->
  <circle cx="100" cy="90" r="30" fill="url(#roseGrad)"/>
  <path d="M90 80 Q100 70, 110 80 Q115 90, 108 98 Q100 105, 92 98 Q85 90, 90 80Z" fill="#FF8A80" opacity="0.6"/>
  <path d="M95 85 Q100 78, 105 85 Q108 92, 103 96 Q100 100, 97 96 Q92 90, 95 85Z" fill="#FFCDD2" opacity="0.5"/>
  <!-- Bottom petals -->
  <path d="M75 130 Q65 115, 70 100 Q80 115, 100 120 Q85 125, 75 130Z" fill="#D32F2F"/>
  <path d="M125 130 Q135 115, 130 100 Q120 115, 100 120 Q115 125, 125 130Z" fill="#D32F2F"/>
  <path d="M85 138 Q80 125, 90 115 Q95 128, 100 130 Q90 135, 85 138Z" fill="#B71C1C" opacity="0.7"/>
  <path d="M115 138 Q120 125, 110 115 Q105 128, 100 130 Q110 135, 115 138Z" fill="#B71C1C" opacity="0.7"/>
</svg>
