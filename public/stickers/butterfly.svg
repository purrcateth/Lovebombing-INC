<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <radialGradient id="wingLeftGrad" cx="60%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#CE93D8"/>
      <stop offset="50%" stop-color="#AB47BC"/>
      <stop offset="100%" stop-color="#7B1FA2"/>
    </radialGradient>
    <radialGradient id="wingRightGrad" cx="40%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#F48FB1"/>
      <stop offset="50%" stop-color="#EC407A"/>
      <stop offset="100%" stop-color="#C2185B"/>
    </radialGradient>
    <filter id="butterflyShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#7B1FA2" flood-opacity="0.2"/>
    </filter>
  </defs>
  <!-- Upper left wing -->
  <path d="M100 85 Q55 25, 20 55 Q5 75, 25 100 Q45 115, 100 100Z" fill="url(#wingLeftGrad)" filter="url(#butterflyShadow)"/>
  <!-- Upper right wing -->
  <path d="M100 85 Q145 25, 180 55 Q195 75, 175 100 Q155 115, 100 100Z" fill="url(#wingRightGrad)" filter="url(#butterflyShadow)"/>
  <!-- Lower left wing -->
  <path d="M100 105 Q55 110, 35 140 Q25 160, 45 165 Q65 170, 100 120Z" fill="url(#wingLeftGrad)" opacity="0.85"/>
  <!-- Lower right wing -->
  <path d="M100 105 Q145 110, 165 140 Q175 160, 155 165 Q135 170, 100 120Z" fill="url(#wingRightGrad)" opacity="0.85"/>
  <!-- Wing spots -->
  <circle cx="55" cy="72" r="12" fill="white" opacity="0.25"/>
  <circle cx="145" cy="72" r="12" fill="white" opacity="0.25"/>
  <circle cx="55" cy="140" r="8" fill="white" opacity="0.2"/>
  <circle cx="145" cy="140" r="8" fill="white" opacity="0.2"/>
  <!-- Body -->
  <ellipse cx="100" cy="105" rx="6" ry="30" fill="#4E342E"/>
  <!-- Head -->
  <circle cx="100" cy="72" r="8" fill="#5D4037"/>
  <!-- Antennae -->
  <path d="M96 65 Q85 40, 75 35" stroke="#5D4037" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M104 65 Q115 40, 125 35" stroke="#5D4037" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="75" cy="35" r="3" fill="#CE93D8"/>
  <circle cx="125" cy="35" r="3" fill="#F48FB1"/>
  <!-- Cute face on head -->
  <circle cx="96" cy="70" r="1.5" fill="white"/>
  <circle cx="104" cy="70" r="1.5" fill="white"/>
  <path d="M97 75 Q100 78, 103 75" fill="none" stroke="white" stroke-width="1" stroke-linecap="round"/>
</svg>
