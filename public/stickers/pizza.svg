<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="pizzaGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#FFE082"/>
      <stop offset="100%" stop-color="#FFB74D"/>
    </linearGradient>
    <linearGradient id="cheeseGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#FFEE58"/>
      <stop offset="100%" stop-color="#FFC107"/>
    </linearGradient>
    <filter id="pizzaShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#E65100" flood-opacity="0.2"/>
    </filter>
  </defs>
  <!-- Crust edge -->
  <path d="M100 20 L25 175 Q100 195, 175 175Z" fill="url(#pizzaGrad)" filter="url(#pizzaShadow)"/>
  <!-- Crust arc -->
  <path d="M100 20 Q60 15, 40 30 L25 175" fill="none" stroke="#D4A056" stroke-width="0" />
  <path d="M75 25 Q100 12, 125 25" stroke="#D7A74A" stroke-width="14" fill="none" stroke-linecap="round"/>
  <!-- Cheese -->
  <path d="M100 38 L35 168 Q100 185, 165 168Z" fill="url(#cheeseGrad)"/>
  <!-- Sauce peek -->
  <path d="M100 42 L40 165 Q100 180, 160 165Z" fill="#FF7043" opacity="0.3"/>
  <!-- Pepperoni -->
  <circle cx="85" cy="90" r="14" fill="#E53935" opacity="0.85"/>
  <circle cx="120" cy="110" r="12" fill="#E53935" opacity="0.85"/>
  <circle cx="75" cy="140" r="13" fill="#E53935" opacity="0.85"/>
  <circle cx="118" cy="150" r="11" fill="#E53935" opacity="0.85"/>
  <!-- Pepperoni highlights -->
  <circle cx="82" cy="87" r="4" fill="#EF5350" opacity="0.5"/>
  <circle cx="117" cy="107" r="3" fill="#EF5350" opacity="0.5"/>
  <!-- Cute face -->
  <circle cx="82" cy="115" r="4" fill="#5D4037"/>
  <circle cx="110" cy="115" r="4" fill="#5D4037"/>
  <circle cx="84" cy="113" r="1.5" fill="white"/>
  <circle cx="112" cy="113" r="1.5" fill="white"/>
  <path d="M88 130 Q96 140, 106 130" fill="none" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Cheeks -->
  <circle cx="70" cy="125" r="7" fill="#FFAB91" opacity="0.4"/>
  <circle cx="122" cy="125" r="7" fill="#FFAB91" opacity="0.4"/>
</svg>
