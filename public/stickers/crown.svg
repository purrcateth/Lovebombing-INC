<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="crownGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE082"/>
      <stop offset="50%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#FFB300"/>
    </linearGradient>
    <filter id="crownShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#FF8F00" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Crown body -->
  <path d="M25 140 L25 75 L55 105 L100 45 L145 105 L175 75 L175 140Z" fill="url(#crownGrad)" filter="url(#crownShadow)"/>
  <!-- Crown base band -->
  <rect x="25" y="130" width="150" height="20" rx="3" fill="#FFB300"/>
  <rect x="25" y="130" width="150" height="20" rx="3" fill="url(#crownGrad)" opacity="0.7"/>
  <!-- Gems -->
  <circle cx="60" cy="140" r="7" fill="#E53935"/>
  <circle cx="100" cy="140" r="7" fill="#2196F3"/>
  <circle cx="140" cy="140" r="7" fill="#4CAF50"/>
  <!-- Gem highlights -->
  <circle cx="58" cy="138" r="2.5" fill="white" opacity="0.4"/>
  <circle cx="98" cy="138" r="2.5" fill="white" opacity="0.4"/>
  <circle cx="138" cy="138" r="2.5" fill="white" opacity="0.4"/>
  <!-- Point tips -->
  <circle cx="25" cy="72" r="5" fill="#FFD54F"/>
  <circle cx="100" cy="42" r="6" fill="#FFD54F"/>
  <circle cx="175" cy="72" r="5" fill="#FFD54F"/>
  <!-- Shine -->
  <path d="M35 80 L45 100 L60 105" fill="none" stroke="white" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
  <!-- Sparkles -->
  <path d="M50 30 L52 37 L59 39 L52 41 L50 48 L48 41 L41 39 L48 37Z" fill="#FFD54F" opacity="0.6"/>
  <path d="M155 25 L157 32 L164 34 L157 36 L155 43 L153 36 L146 34 L153 32Z" fill="#FFD54F" opacity="0.6"/>
</svg>
