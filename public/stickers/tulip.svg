<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="tulipGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF80AB"/>
      <stop offset="100%" stop-color="#F50057"/>
    </linearGradient>
    <filter id="tulipShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#C51162" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- Stem -->
  <path d="M100 130 Q98 155, 100 190" stroke="#43A047" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Leaves -->
  <path d="M100 160 C115 150, 130 155, 138 148 C130 162, 115 165, 100 165" fill="#66BB6A"/>
  <path d="M100 155 C85 145, 70 150, 62 143 C70 157, 85 160, 100 160" fill="#66BB6A"/>
  <!-- Tulip petals -->
  <g filter="url(#tulipShadow)">
    <!-- Left petal -->
    <path d="M65 80 C55 45, 75 20, 95 30 C90 50, 80 70, 75 95 Q68 100, 65 80Z" fill="url(#tulipGrad)"/>
    <!-- Right petal -->
    <path d="M135 80 C145 45, 125 20, 105 30 C110 50, 120 70, 125 95 Q132 100, 135 80Z" fill="url(#tulipGrad)"/>
    <!-- Center petal -->
    <path d="M85 90 C80 55, 90 15, 100 12 C110 15, 120 55, 115 90 Q108 120, 100 130 Q92 120, 85 90Z" fill="#FF4081"/>
  </g>
  <!-- Highlight -->
  <path d="M95 25 C98 35, 100 50, 100 70" stroke="white" stroke-width="2" fill="none" opacity="0.3" stroke-linecap="round"/>
</svg>
