<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <radialGradient id="cloudGrad" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E3F2FD"/>
    </radialGradient>
    <filter id="cloudShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#90CAF9" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Cloud body -->
  <g filter="url(#cloudShadow)">
    <circle cx="70" cy="110" r="40" fill="url(#cloudGrad)"/>
    <circle cx="110" cy="100" r="45" fill="url(#cloudGrad)"/>
    <circle cx="145" cy="115" r="35" fill="url(#cloudGrad)"/>
    <circle cx="90" cy="85" r="35" fill="url(#cloudGrad)"/>
    <circle cx="125" cy="80" r="32" fill="url(#cloudGrad)"/>
    <rect x="40" y="105" width="130" height="40" rx="20" fill="url(#cloudGrad)"/>
  </g>
  <!-- Cute face -->
  <circle cx="82" cy="105" r="5" fill="#5D4037"/>
  <circle cx="118" cy="105" r="5" fill="#5D4037"/>
  <!-- Eye shine -->
  <circle cx="84" cy="103" r="2" fill="white"/>
  <circle cx="120" cy="103" r="2" fill="white"/>
  <!-- Smile -->
  <path d="M88 122 Q100 135, 112 122" fill="none" stroke="#5D4037" stroke-width="3" stroke-linecap="round"/>
  <!-- Cheeks -->
  <circle cx="68" cy="118" r="9" fill="#FFB3C1" opacity="0.4"/>
  <circle cx="132" cy="118" r="9" fill="#FFB3C1" opacity="0.4"/>
  <!-- Hearts floating above -->
  <path d="M60 55 C57 51, 51 51, 51 55 C51 59, 60 65, 60 65 C60 65, 69 59, 69 55 C69 51, 63 51, 60 55Z" fill="#FF80AB" opacity="0.5"/>
  <path d="M140 50 C138 47, 134 47, 134 50 C134 53, 140 57, 140 57 C140 57, 146 53, 146 50 C146 47, 142 47, 140 50Z" fill="#FF80AB" opacity="0.4"/>
</svg>
