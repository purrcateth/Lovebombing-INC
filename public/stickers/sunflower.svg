<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <radialGradient id="sunCenterGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6D4C41"/>
      <stop offset="100%" stop-color="#4E342E"/>
    </radialGradient>
    <filter id="sunShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#E65100" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- Stem -->
  <path d="M100 145 Q98 165, 100 190" stroke="#558B2F" stroke-width="7" fill="none" stroke-linecap="round"/>
  <!-- Leaves -->
  <path d="M100 168 Q130 155, 140 165 Q128 175, 100 173" fill="#7CB342"/>
  <path d="M100 158 Q70 145, 62 155 Q72 165, 100 162" fill="#7CB342"/>
  <!-- Petals - two layers -->
  <g filter="url(#sunShadow)">
    <!-- Outer petals -->
    <ellipse cx="100" cy="48" rx="12" ry="28" fill="#FFA000" transform="rotate(0 100 90)"/>
    <ellipse cx="100" cy="48" rx="12" ry="28" fill="#FFA000" transform="rotate(30 100 90)"/>
    <ellipse cx="100" cy="48" rx="12" ry="28" fill="#FFA000" transform="rotate(60 100 90)"/>
    <ellipse cx="100" cy="48" rx="12" ry="28" fill="#FFA000" transform="rotate(90 100 90)"/>
    <ellipse cx="100" cy="48" rx="12" ry="28" fill="#FFA000" transform="rotate(120 100 90)"/>
    <ellipse cx="100" cy="48" rx="12" ry="28" fill="#FFA000" transform="rotate(150 100 90)"/>
    <ellipse cx="100" cy="48" rx="12" ry="28" fill="#FFA000" transform="rotate(180 100 90)"/>
    <ellipse cx="100" cy="48" rx="12" ry="28" fill="#FFA000" transform="rotate(210 100 90)"/>
    <ellipse cx="100" cy="48" rx="12" ry="28" fill="#FFA000" transform="rotate(240 100 90)"/>
    <ellipse cx="100" cy="48" rx="12" ry="28" fill="#FFA000" transform="rotate(270 100 90)"/>
    <ellipse cx="100" cy="48" rx="12" ry="28" fill="#FFA000" transform="rotate(300 100 90)"/>
    <ellipse cx="100" cy="48" rx="12" ry="28" fill="#FFA000" transform="rotate(330 100 90)"/>
    <!-- Inner petals -->
    <ellipse cx="100" cy="55" rx="10" ry="24" fill="#FFC107" transform="rotate(15 100 90)"/>
    <ellipse cx="100" cy="55" rx="10" ry="24" fill="#FFC107" transform="rotate(45 100 90)"/>
    <ellipse cx="100" cy="55" rx="10" ry="24" fill="#FFC107" transform="rotate(75 100 90)"/>
    <ellipse cx="100" cy="55" rx="10" ry="24" fill="#FFC107" transform="rotate(105 100 90)"/>
    <ellipse cx="100" cy="55" rx="10" ry="24" fill="#FFC107" transform="rotate(135 100 90)"/>
    <ellipse cx="100" cy="55" rx="10" ry="24" fill="#FFC107" transform="rotate(165 100 90)"/>
    <ellipse cx="100" cy="55" rx="10" ry="24" fill="#FFC107" transform="rotate(195 100 90)"/>
    <ellipse cx="100" cy="55" rx="10" ry="24" fill="#FFC107" transform="rotate(225 100 90)"/>
    <ellipse cx="100" cy="55" rx="10" ry="24" fill="#FFC107" transform="rotate(255 100 90)"/>
    <ellipse cx="100" cy="55" rx="10" ry="24" fill="#FFC107" transform="rotate(285 100 90)"/>
    <ellipse cx="100" cy="55" rx="10" ry="24" fill="#FFC107" transform="rotate(315 100 90)"/>
    <ellipse cx="100" cy="55" rx="10" ry="24" fill="#FFC107" transform="rotate(345 100 90)"/>
  </g>
  <!-- Center -->
  <circle cx="100" cy="90" r="24" fill="url(#sunCenterGrad)"/>
  <!-- Cute face -->
  <circle cx="92" cy="86" r="3" fill="white"/>
  <circle cx="108" cy="86" r="3" fill="white"/>
  <path d="M92 96 Q100 104, 108 96" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Cheeks -->
  <circle cx="82" cy="93" r="5" fill="#FFAB91" opacity="0.5"/>
  <circle cx="118" cy="93" r="5" fill="#FFAB91" opacity="0.5"/>
</svg>
